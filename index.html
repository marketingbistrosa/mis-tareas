<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskFlow 🌸 — Equipo MKT</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

:root {
  --font: 'Plus Jakarta Sans', sans-serif;
  --radius: 22px; --radius-md: 16px; --radius-sm: 12px;
  --bg-from: #fff0f6; --bg-to: #f0f4ff;
  --card: rgba(255,255,255,0.88);
  --border: rgba(15,23,42,0.07);
  --text: #1a1a2e; --muted: #64748b;
  --shadow: 0 16px 40px rgba(15,23,42,0.10);
  --shadow-sm: 0 6px 20px rgba(15,23,42,0.07);
  --current-h: #ff6b9d; --current-s: #ffe0ee; --current-t: #c2185b;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:var(--font);color:var(--text);min-height:100vh;
  background: radial-gradient(circle at 10% 10%, rgba(255,107,157,0.18) 0%, transparent 35%),
              radial-gradient(circle at 90% 5%,  rgba(167,139,250,0.18) 0%, transparent 30%),
              radial-gradient(circle at 50% 95%, rgba(52,211,153,0.15) 0%, transparent 30%),
              linear-gradient(135deg, var(--bg-from) 0%, var(--bg-to) 100%);
  padding: 24px;
}
button,input,select,textarea{font-family:var(--font);}
button{border:none;cursor:pointer;}

.persona-selector{max-width:1200px;margin:0 auto 28px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.persona-label{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;}
.persona-tabs{display:flex;gap:8px;flex-wrap:wrap;}
.persona-tab{display:flex;align-items:center;gap:8px;padding:10px 18px;border-radius:999px;font-size:13px;font-weight:700;border:2px solid transparent;background:rgba(255,255,255,0.7);color:var(--muted);transition:all .2s;cursor:pointer;box-shadow:var(--shadow-sm);}
.persona-tab .tab-avatar{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;}
.persona-tab:hover{transform:translateY(-1px);box-shadow:var(--shadow);}
.persona-tab[data-p="0"] .tab-avatar{background:#ff6b9d;}
.persona-tab[data-p="1"] .tab-avatar{background:#a78bfa;}
.persona-tab[data-p="2"] .tab-avatar{background:#34d399;}
.persona-tab[data-p="3"] .tab-avatar{background:#fb923c;}
.persona-tab[data-p="0"].active{color:#c2185b;border-color:#ff6b9d;background:#fff;}
.persona-tab[data-p="1"].active{color:#6d28d9;border-color:#a78bfa;background:#fff;}
.persona-tab[data-p="2"].active{color:#047857;border-color:#34d399;background:#fff;}
.persona-tab[data-p="3"].active{color:#c2410c;border-color:#fb923c;background:#fff;}

.app{max-width:1200px;margin:0 auto;}

.hero{background:var(--card);border-radius:var(--radius);border:1px solid rgba(255,255,255,0.8);box-shadow:var(--shadow);backdrop-filter:blur(18px);padding:28px 32px;margin-bottom:22px;display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap;}
.hero-left{display:flex;align-items:center;gap:16px;}
.hero-avatar{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff;background:var(--current-h);box-shadow:0 8px 24px rgba(0,0,0,.15);transition:background .3s;flex-shrink:0;}
.hero-name{font-size:24px;font-weight:800;letter-spacing:-.03em;line-height:1;}
.hero-sub{font-size:13px;color:var(--muted);margin-top:4px;}
.hero-right{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}

.stat-pill{background:rgba(255,255,255,0.7);border:1px solid var(--border);border-radius:999px;padding:10px 18px;text-align:center;box-shadow:var(--shadow-sm);}
.stat-pill-n{font-size:20px;font-weight:800;color:var(--current-h);transition:color .3s;}
.stat-pill-l{font-size:11px;color:var(--muted);font-weight:600;}

.conn-pill{display:flex;align-items:center;gap:7px;background:rgba(255,255,255,0.7);border:1px solid var(--border);border-radius:999px;padding:10px 16px;font-size:12px;font-weight:700;color:var(--muted);box-shadow:var(--shadow-sm);}
.conn-dot{width:9px;height:9px;border-radius:50%;background:#facc15;transition:background .3s;}
.conn-dot.online{background:#22c55e;box-shadow:0 0 0 5px rgba(34,197,94,.15);}
.conn-dot.error{background:#ef4444;}

.dashboard{display:grid;grid-template-columns:minmax(0,1.65fr) 300px;gap:22px;align-items:start;}

.card{background:var(--card);border-radius:var(--radius);border:1px solid rgba(255,255,255,0.75);box-shadow:var(--shadow);backdrop-filter:blur(18px);padding:22px;}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;gap:12px;}
.card-head h2{font-size:16px;font-weight:800;letter-spacing:-.03em;}
.count-badge{background:var(--current-s);color:var(--current-t);border-radius:999px;padding:5px 13px;font-size:12px;font-weight:800;transition:background .3s,color .3s;}

.add-form{display:flex;gap:10px;margin-bottom:18px;flex-wrap:wrap;}
.add-form input,.add-form select{padding:12px 15px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:#fff;color:var(--text);outline:none;font-size:13.5px;transition:border .2s,box-shadow .2s;}
.add-form input:focus,.add-form select:focus{border-color:var(--current-h);box-shadow:0 0 0 4px rgba(255,107,157,.12);}
.add-form input.grow{flex:1;min-width:180px;}
.add-form select{min-width:130px;}
.add-btn{padding:12px 20px;border-radius:var(--radius-sm);background:var(--current-h);color:#fff;font-size:13.5px;font-weight:800;box-shadow:0 8px 20px rgba(0,0,0,.12);transition:all .2s;white-space:nowrap;flex-shrink:0;}
.add-btn:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(0,0,0,.16);}

.filters{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.filter-btn{padding:7px 14px;border-radius:999px;font-size:12px;font-weight:700;background:rgba(255,255,255,0.6);color:var(--muted);border:1.5px solid transparent;transition:all .15s;}
.filter-btn:hover{background:#fff;}
.filter-btn.active{background:var(--current-s);color:var(--current-t);border-color:var(--current-h);}

.task-list{display:flex;flex-direction:column;gap:10px;}
.task-item{background:#fff;border-radius:var(--radius-md);border:1.5px solid var(--border);padding:14px 16px;transition:all .2s;border-left:4px solid transparent;}
.task-item:hover{box-shadow:var(--shadow-sm);transform:translateY(-1px);}
.task-item.pri-Alta{border-left-color:#ef4444;}
.task-item.pri-Media{border-left-color:#facc15;}
.task-item.pri-Baja{border-left-color:#22c55e;}
.task-item.done-yes{opacity:.55;}

.task-row{display:flex;align-items:flex-start;gap:11px;}
.task-check{width:20px;height:20px;border-radius:6px;border:2px solid #d1d5db;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;transition:all .15s;background:transparent;}
.task-check.checked{background:#22c55e;border-color:#22c55e;}
.task-check.checked::after{content:'✓';color:#fff;font-size:11px;font-weight:800;}

.task-info{flex:1;min-width:0;}
.task-name{font-size:14px;font-weight:700;}
.done-yes .task-name{text-decoration:line-through;color:var(--muted);}
.task-meta{display:flex;gap:7px;margin-top:5px;flex-wrap:wrap;align-items:center;}
.badge{padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;}
.b-Alta{background:#fee2e2;color:#dc2626;}
.b-Media{background:#fef9c3;color:#b45309;}
.b-Baja{background:#dcfce7;color:#16a34a;}
.b-done{background:#dcfce7;color:#16a34a;}
.b-pend{background:#f1f5f9;color:#64748b;}
.task-date{font-size:11px;color:var(--muted);}

.task-btns{display:flex;gap:4px;margin-left:auto;flex-shrink:0;}
.icon-btn{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;background:transparent;color:#94a3b8;transition:all .15s;font-size:14px;}
.icon-btn:hover{background:#f1f5f9;color:var(--text);}

.comments-panel{margin-top:12px;padding-top:12px;border-top:1.5px dashed #e2e8f0;display:none;}
.comments-panel.open{display:block;}
.comment-item{background:#f8fafc;border-radius:10px;padding:9px 12px;margin-bottom:7px;border-left:3px solid var(--current-h);transition:border-color .3s;}
.c-meta{display:flex;justify-content:space-between;margin-bottom:3px;}
.c-author{font-size:12px;font-weight:700;color:var(--current-h);transition:color .3s;}
.c-date{font-size:11px;color:var(--muted);}
.c-text{font-size:13px;color:var(--text);line-height:1.5;}
.comment-form{display:flex;gap:8px;margin-top:10px;}
.comment-form input{flex:1;padding:9px 12px;border-radius:10px;border:1.5px solid var(--border);font-size:13px;color:var(--text);outline:none;transition:border .2s;background:#fff;}
.comment-form input:focus{border-color:var(--current-h);}
.comment-btn-send{padding:9px 14px;border-radius:10px;background:var(--current-s);color:var(--current-t);font-size:13px;font-weight:700;transition:all .15s;flex-shrink:0;}
.comment-btn-send:hover{filter:brightness(.95);}

.milestone-item{display:flex;align-items:center;gap:10px;padding:11px 14px;background:#fff;border-radius:var(--radius-sm);border:1.5px solid var(--border);margin-bottom:8px;}
.ms-dot{width:10px;height:10px;border-radius:50%;background:var(--current-h);flex-shrink:0;transition:background .3s;}
.ms-text{font-size:13px;font-weight:600;flex:1;}
.ms-date{font-size:11px;color:var(--muted);}

.actions-bar{display:flex;gap:8px;margin-top:18px;flex-wrap:wrap;}
.action-btn{display:flex;align-items:center;gap:7px;padding:10px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:700;transition:all .2s;background:rgba(255,255,255,0.8);color:var(--muted);border:1.5px solid var(--border);box-shadow:var(--shadow-sm);}
.action-btn:hover{background:#fff;transform:translateY(-1px);box-shadow:var(--shadow);color:var(--text);}
.action-btn.primary{background:var(--current-h);color:#fff;border-color:transparent;box-shadow:0 8px 20px rgba(0,0,0,.12);}
.action-btn.primary:hover{filter:brightness(1.05);}

.empty-state{text-align:center;padding:40px 20px;color:var(--muted);font-size:14px;}
.empty-state .emoji{font-size:36px;margin-bottom:10px;}

.loading{display:flex;align-items:center;justify-content:center;gap:10px;padding:40px;color:var(--muted);}
@keyframes spin{to{transform:rotate(360deg);}}
.spinner{width:20px;height:20px;border:2.5px solid #e2e8f0;border-top-color:var(--current-h);border-radius:50%;animation:spin .6s linear infinite;}

.blob{position:fixed;border-radius:50%;filter:blur(60px);pointer-events:none;z-index:-1;opacity:.35;}
.blob-1{width:350px;height:350px;background:#ff6b9d;top:-80px;left:-80px;}
.blob-2{width:300px;height:300px;background:#a78bfa;top:0;right:-60px;}
.blob-3{width:280px;height:280px;background:#34d399;bottom:-60px;left:30%;}

@media(max-width:900px){.dashboard{grid-template-columns:1fr;}}
@media(max-width:600px){body{padding:14px;}.hero{padding:18px;}.add-form{flex-direction:column;}.add-form select{min-width:unset;}}
</style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="persona-selector">
  <span class="persona-label">¿Quién sos? 🌸</span>
  <div class="persona-tabs">
    <button class="persona-tab active" data-p="0" onclick="switchPersona(0)">
      <div class="tab-avatar">A</div> Angie
    </button>
    <button class="persona-tab" data-p="1" onclick="switchPersona(1)">
      <div class="tab-avatar">F</div> Francia
    </button>
    <button class="persona-tab" data-p="2" onclick="switchPersona(2)">
      <div class="tab-avatar">S</div> Sol
    </button>
    <button class="persona-tab" data-p="3" onclick="switchPersona(3)">
      <div class="tab-avatar">A</div> Abril
    </button>
  </div>
</div>

<div class="app">
  <div class="hero">
    <div class="hero-left">
      <div class="hero-avatar" id="heroAvatar">A</div>
      <div>
        <div class="hero-name" id="heroName">Hola, Angie 🌸</div>
        <div class="hero-sub">Tus tareas de hoy · Equipo MKT</div>
      </div>
    </div>
    <div class="hero-right">
      <div class="stat-pill">
        <div class="stat-pill-n" id="statTotal">0</div>
        <div class="stat-pill-l">Total</div>
      </div>
      <div class="stat-pill">
        <div class="stat-pill-n" id="statPend">0</div>
        <div class="stat-pill-l">Pendientes</div>
      </div>
      <div class="stat-pill">
        <div class="stat-pill-n" id="statDone">0</div>
        <div class="stat-pill-l">Listas ✓</div>
      </div>
      <div class="conn-pill">
        <div class="conn-dot" id="connDot"></div>
        <span id="connText">Conectando...</span>
      </div>
    </div>
  </div>

  <div class="dashboard">
    <div class="card">
      <div class="card-head">
        <h2 id="cardTitle">Mis tareas 📋</h2>
        <span class="count-badge" id="countBadge">0 tareas</span>
      </div>
      <div class="add-form">
        <input class="grow" id="taskInput" placeholder="✏️ Nueva tarea..." onkeydown="if(event.key==='Enter')addTask()" />
        <select id="taskPriority">
          <option value="Alta">🔴 Alta</option>
          <option value="Media" selected>🟡 Media</option>
          <option value="Baja">🟢 Baja</option>
        </select>
        <button class="add-btn" onclick="addTask()">+ Agregar</button>
      </div>
      <div class="filters">
        <button class="filter-btn active" onclick="setFilter('todas',this)">Todas</button>
        <button class="filter-btn" onclick="setFilter('pendientes',this)">Pendientes</button>
        <button class="filter-btn" onclick="setFilter('completadas',this)">Completadas</button>
        <button class="filter-btn" onclick="setFilter('Alta',this)">🔴 Alta</button>
        <button class="filter-btn" onclick="setFilter('Media',this)">🟡 Media</button>
        <button class="filter-btn" onclick="setFilter('Baja',this)">🟢 Baja</button>
      </div>
      <div class="task-list" id="taskList">
        <div class="loading"><div class="spinner"></div> Cargando...</div>
      </div>
      <div class="actions-bar">
        <button class="action-btn primary" onclick="downloadPDF()">⬇️ Descargar PDF</button>
      </div>
    </div>

    <div>
      <div class="card">
        <div class="card-head">
          <h2>Hitos del mes 🌟</h2>
          <span class="count-badge" id="msCount">0</span>
        </div>
        <div class="add-form" style="flex-direction:column;">
          <input id="msInput" placeholder="📍 Nuevo hito..." style="width:100%" />
          <div style="display:flex;gap:8px;">
            <input type="date" id="msDate" style="flex:1" />
            <button class="add-btn" style="flex-shrink:0" onclick="addMilestone()">+ Agregar</button>
          </div>
        </div>
        <div id="milestoneList">
          <div class="empty-state"><div class="emoji">📅</div>Sin hitos aún</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, addDoc, updateDoc, deleteDoc,
  doc, onSnapshot, serverTimestamp, query, orderBy, where
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDfZSWGIKQ6W-ngbf0SQAytaVhaLnQoDnU",
  authDomain: "mis-tareas-b851b.firebaseapp.com",
  projectId: "mis-tareas-b851b",
  storageBucket: "mis-tareas-b851b.firebasestorage.app",
  messagingSenderId: "397139383422",
  appId: "1:397139383422:web:a9f2ab0999592e44c9b42f"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

// ── Las 4 chicas del equipo ───────────────────────────────
const PERSONAS = [
  { key:'angie',   name:'Angie',   emoji:'🌸', avatar:'A', greet:'Hola, Angie 🌸',   h:'#ff6b9d', s:'#ffe0ee', t:'#c2185b' },
  { key:'francia', name:'Francia', emoji:'💜', avatar:'F', greet:'Hola, Francia 💜', h:'#a78bfa', s:'#ede9fe', t:'#6d28d9' },
  { key:'sol',     name:'Sol',     emoji:'🌿', avatar:'S', greet:'Hola, Sol 🌿',     h:'#34d399', s:'#d1fae5', t:'#047857' },
  { key:'abril',   name:'Abril',   emoji:'🧡', avatar:'A', greet:'Hola, Abril 🧡',   h:'#fb923c', s:'#ffedd5', t:'#c2410c' },
];

let currentP = 0;
let tasks = [];
let milestones = [];
let currentFilter = 'todas';
let unsubTasks = null;
let unsubMilestones = null;

window.switchPersona = (idx) => {
  currentP = idx;
  const p = PERSONAS[idx];

  document.documentElement.style.setProperty('--current-h', p.h);
  document.documentElement.style.setProperty('--current-s', p.s);
  document.documentElement.style.setProperty('--current-t', p.t);

  document.getElementById('heroAvatar').textContent = p.avatar;
  document.getElementById('heroAvatar').style.background = p.h;
  document.getElementById('heroName').textContent = p.greet;
  document.getElementById('cardTitle').textContent = `Mis tareas ${p.emoji}`;

  document.querySelectorAll('.persona-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.persona-tab')[idx].classList.add('active');

  currentFilter = 'todas';
  document.querySelectorAll('.filter-btn').forEach((b,i) => b.classList.toggle('active', i===0));

  if (unsubTasks) unsubTasks();
  if (unsubMilestones) unsubMilestones();
  subscribeToData();
};

function subscribeToData() {
  const p = PERSONAS[currentP];
  document.getElementById('taskList').innerHTML = '<div class="loading"><div class="spinner"></div> Cargando...</div>';

  unsubTasks = onSnapshot(
    query(collection(db,'tasks'), where('persona','==',p.key), orderBy('createdAt','desc')),
    snap => {
      tasks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderTasks(); updateStats(); setConn('online','En línea · Tiempo real');
    },
    () => setConn('error','Sin conexión')
  );

  unsubMilestones = onSnapshot(
    query(collection(db,'milestones'), where('persona','==',p.key), orderBy('createdAt','asc')),
    snap => {
      milestones = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      renderMilestones();
    }
  );
}

function setConn(state, text) {
  document.getElementById('connDot').className = 'conn-dot ' + state;
  document.getElementById('connText').textContent = text;
}

function getFiltered() {
  switch(currentFilter) {
    case 'pendientes':  return tasks.filter(t => !t.done);
    case 'completadas': return tasks.filter(t =>  t.done);
    case 'Alta':  return tasks.filter(t => t.priority==='Alta');
    case 'Media': return tasks.filter(t => t.priority==='Media');
    case 'Baja':  return tasks.filter(t => t.priority==='Baja');
    default: return tasks;
  }
}

function fmt(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('es-AR',{day:'2-digit',month:'short'});
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderTasks() {
  const list = document.getElementById('taskList');
  const filtered = getFiltered();
  document.getElementById('countBadge').textContent = `${filtered.length} tareas`;

  if (!filtered.length) {
    list.innerHTML = `<div class="empty-state"><div class="emoji">✨</div>No hay tareas acá. ¡Agregá una!</div>`;
    return;
  }

  list.innerHTML = filtered.map(t => {
    const comments = (t.comments||[]).map(c => `
      <div class="comment-item">
        <div class="c-meta"><span class="c-author">${esc(c.author)}</span><span class="c-date">${c.date||''}</span></div>
        <div class="c-text">${esc(c.text)}</div>
      </div>`).join('');

    return `
    <div class="task-item pri-${t.priority} ${t.done?'done-yes':''}" id="ti-${t.id}">
      <div class="task-row">
        <div class="task-check ${t.done?'checked':''}" onclick="toggleDone('${t.id}',${!!t.done})"></div>
        <div class="task-info">
          <div class="task-name">${esc(t.name)}</div>
          <div class="task-meta">
            <span class="badge b-${t.priority}">${t.priority}</span>
            <span class="badge ${t.done?'b-done':'b-pend'}">${t.done?'Lista ✓':'Pendiente'}</span>
            <span class="task-date">${fmt(t.createdAt)}</span>
            ${(t.comments||[]).length ? `<span class="task-date">💬 ${t.comments.length}</span>` : ''}
          </div>
        </div>
        <div class="task-btns">
          <button class="icon-btn" onclick="toggleComments('${t.id}')" title="Comentarios">💬</button>
          <button class="icon-btn" onclick="deleteTask('${t.id}')" title="Eliminar">🗑️</button>
        </div>
      </div>
      <div class="comments-panel" id="cp-${t.id}">
        <div id="cl-${t.id}">
          ${(t.comments||[]).length ? comments : '<div style="font-size:12px;color:#94a3b8;margin-bottom:8px;">Sin comentarios aún 🌸</div>'}
        </div>
        <div class="comment-form">
          <input placeholder="Escribí un comentario..." id="ci-${t.id}" onkeydown="if(event.key==='Enter')addComment('${t.id}')" />
          <button class="comment-btn-send" onclick="addComment('${t.id}')">Enviar ✉️</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderMilestones() {
  const el = document.getElementById('milestoneList');
  document.getElementById('msCount').textContent = milestones.length;
  if (!milestones.length) { el.innerHTML='<div class="empty-state"><div class="emoji">📅</div>Sin hitos aún</div>'; return; }
  el.innerHTML = milestones.map(m => `
    <div class="milestone-item">
      <div class="ms-dot"></div>
      <div style="flex:1">
        <div class="ms-text">${esc(m.text)}</div>
        ${m.date?`<div class="ms-date">📍 ${m.date}</div>`:''}
      </div>
      <button class="icon-btn" onclick="deleteMilestone('${m.id}')">✕</button>
    </div>`).join('');
}

function updateStats() {
  document.getElementById('statTotal').textContent = tasks.length;
  document.getElementById('statPend').textContent  = tasks.filter(t=>!t.done).length;
  document.getElementById('statDone').textContent  = tasks.filter(t=>t.done).length;
}

window.addTask = async () => {
  const input = document.getElementById('taskInput');
  const name = input.value.trim();
  if (!name) return;
  await addDoc(collection(db,'tasks'), {
    persona: PERSONAS[currentP].key,
    name, priority: document.getElementById('taskPriority').value,
    done: false, comments: [], createdAt: serverTimestamp()
  });
  input.value = '';
};

window.toggleDone = async (id, current) => {
  await updateDoc(doc(db,'tasks',id), { done: !current });
};

window.deleteTask = async (id) => {
  if (!confirm('¿Eliminar esta tarea?')) return;
  await deleteDoc(doc(db,'tasks',id));
};

window.toggleComments = (id) => {
  document.getElementById('cp-'+id).classList.toggle('open');
};

window.addComment = async (taskId) => {
  const input = document.getElementById('ci-'+taskId);
  const text = input.value.trim();
  if (!text) return;
  const task = tasks.find(t => t.id === taskId);
  if (!task) return;
  const comments = [...(task.comments||[])];
  comments.push({
    author: PERSONAS[currentP].name,
    text,
    date: new Date().toLocaleDateString('es-AR',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})
  });
  await updateDoc(doc(db,'tasks',taskId), { comments });
  input.value = '';
};

window.addMilestone = async () => {
  const text = document.getElementById('msInput').value.trim();
  if (!text) return;
  await addDoc(collection(db,'milestones'), {
    persona: PERSONAS[currentP].key,
    text, date: document.getElementById('msDate').value,
    createdAt: serverTimestamp()
  });
  document.getElementById('msInput').value = '';
  document.getElementById('msDate').value = '';
};

window.deleteMilestone = async (id) => {
  await deleteDoc(doc(db,'milestones',id));
};

window.setFilter = (f, btn) => {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderTasks();
};

window.downloadPDF = () => {
  const p = PERSONAS[currentP];
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
  const hColor = p.h.match(/\w\w/g).map(x=>parseInt(x,16));
  const DARK=[26,26,46], GRAY=[100,116,139];

  pdf.setFillColor(...hColor);
  pdf.rect(0,0,210,36,'F');
  pdf.setTextColor(255,255,255);
  pdf.setFontSize(20); pdf.setFont('helvetica','bold');
  pdf.text(`TaskFlow — Reporte de ${p.name} ${p.emoji}`, 14, 16);
  pdf.setFontSize(9); pdf.setFont('helvetica','normal');
  pdf.text(`Generado el ${new Date().toLocaleDateString('es-AR',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}`, 14, 28);

  let y = 46;
  const total=tasks.length, done=tasks.filter(t=>t.done).length;
  pdf.setFontSize(10); pdf.setFont('helvetica','bold'); pdf.setTextColor(...hColor);
  pdf.text('Resumen', 14, y); y+=6;
  pdf.setFont('helvetica','normal'); pdf.setTextColor(...DARK); pdf.setFontSize(9.5);
  pdf.text(`Total: ${total}   |   Completadas: ${done}   |   Pendientes: ${total-done}`, 14, y); y+=10;

  pdf.autoTable({
    startY: y,
    head: [['Tarea','Prioridad','Estado']],
    body: tasks.map(t=>[t.name, t.priority, t.done?'Completada':'Pendiente']),
    headStyles:{fillColor:hColor,textColor:[255,255,255],fontStyle:'bold',fontSize:9},
    bodyStyles:{fontSize:8.5,textColor:DARK},
    alternateRowStyles:{fillColor:[249,250,251]},
    columnStyles:{0:{cellWidth:110},1:{cellWidth:30,halign:'center'},2:{cellWidth:40,halign:'center'}},
    margin:{left:14,right:14}
  });

  y = pdf.lastAutoTable.finalY + 12;
  const withC = tasks.filter(t=>t.comments&&t.comments.length>0);
  if (withC.length) {
    pdf.setFontSize(11); pdf.setFont('helvetica','bold'); pdf.setTextColor(...hColor);
    pdf.text('Comentarios y feedback', 14, y); y+=8;
    withC.forEach(t => {
      if(y>265){pdf.addPage();y=20;}
      pdf.setFontSize(10); pdf.setFont('helvetica','bold'); pdf.setTextColor(...hColor);
      pdf.text(`• ${t.name}`, 14, y); y+=6;
      t.comments.forEach(c => {
        if(y>272){pdf.addPage();y=20;}
        pdf.setFont('helvetica','bold'); pdf.setFontSize(8.5); pdf.setTextColor(...GRAY);
        pdf.text(`  ${c.author} — ${c.date}`, 16, y); y+=4.5;
        pdf.setFont('helvetica','normal'); pdf.setTextColor(...DARK);
        pdf.splitTextToSize(c.text,170).forEach(l=>{if(y>276){pdf.addPage();y=20;}pdf.text('  '+l,16,y);y+=4;});
        y+=2;
      });
      y+=4;
    });
  }

  const pages = pdf.getNumberOfPages();
  for(let i=1;i<=pages;i++){
    pdf.setPage(i);
    pdf.setFontSize(8); pdf.setTextColor(...GRAY);
    pdf.text(`Página ${i} de ${pages} — TaskFlow · Equipo MKT`, 105, 292, {align:'center'});
  }
  pdf.save(`reporte-${p.key}-${new Date().toISOString().slice(0,10)}.pdf`);
};

subscribeToData();
</script>
</body>
</html>
